format = '''
[\[$username@$hostname\]:\[${custom.root}$git_branch${custom.jj-bookmark}\]$git_status$git_state${custom.jj-status}
- $character ](fg:white)
'''

[username]
style_root = "bright-red"
style_user = "bright-blue"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
ssh_symbol = "-@"
format = "$ssh_symbol[$hostname]($style)"
style = "bright-blue"

[directory]
format = '[$read_only]($read_only_style)[$path]($style)'
style = "fg:bright-blue"
truncation_symbol = "*/"

read_only = "!"
repo_root_style = "fg:bright-yellow"
repo_root_format = '[$read_only]($read_only_style)[$repo_root]($repo_root_style)[$path]($style)'

[git_branch]
ignore_branches = ["main"]
style = "fg:bright-purple"
truncation_length = 16
truncation_symbol = "*"
format = "@[$branch(:$remote_branch)]($style)"
only_attached = true

[git_status]
format = '( \[[$all_status$ahead_behind]($style)\])'
style = "fg:bright-white"
conflicted = "[X](fg:bright-red)"
stashed = "[T](fg:bright-black)"
deleted = "[D](fg:bright-yellow)"
renamed = "[R](fg:bright-yellow)"
modified = "[M](fg:bright-yellow)"
staged = "[S](fg:bright-green)"
untracked = "[U](fg:bright-purple)"

diverged = "/"
ahead = "+"
behind = "-"
up_to_date = ""

[git_state]
format = ' \[[$state]($style)(:[$progress_current/$progress_total](fg:bright-white))\]'
rebase = "[REBASING](fg:bright-red)"
merge = "[MERGING](fg:bright-red)"
revert = "[REVERTING](fg:bright-purple)"
cherry_pick = "[PICKING](fg:bright-red)"
bisect = "[BISECTING](fg:bright-green)"
am = "APPLYING"
am_or_rebase = "APPLYING/REBASING"
style = "fg:bright-white"

[character]
format = "$symbol"
success_symbol = '[\$](fg:bright-white)'
error_symbol = '[\$](fg:bright-red)'

[custom.root]
description = "Repo root or directory"
format = '[$output](fg:bright-yellow)'
command = "jj root >/dev/null 2>&1 && basename $(jj root) || starship module directory"
when = true

[custom.jj-bookmark]
description = "JJ Bookmark for current commit"
format = '(@[$output](fg:bright-purple))'
command = """jj log --revisions @ --no-graph --ignore-working-copy --color never --limit 1 --template '\
if(empty && description.first_line().len() == 0, "",\
coalesce(bookmarks, change_id.shortest(3)))\
'"""
detect_folders = [".jj"]

[custom.jj-status]
description = "JJ Status icons (when conflicted/hidden/etc.)"
format = '( \[[$output](fg:bright-red)\])'
command = """jj log --revisions @ --no-graph --ignore-working-copy --color never --limit 1 --template '\
separate("/",\
if(conflict, "CONFLICT"),\
if(divergent, "DIVERGENT"),\
if(hidden, "HIDDEN"),\
if(immutable, "IMMUTABLE"),\
)\
'"""
detect_folders = [".jj"]
