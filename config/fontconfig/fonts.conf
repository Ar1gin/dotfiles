<?xml version='1.0' encoding='UTF-8'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
 <match target="font">
  <test compare="not_eq" name="spacing" qual="any">
   <int>0</int>
  </test>
  <!-- Subpixel antialiasing is jarring to look at on my screen -->
  <edit mode="assign" name="rgba">
   <int>5</int>
  </edit>
  <!-- Godbless autohinter, I can now enjoy my crispy fonts -->
  <edit mode="assign" name="autohint">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hintstyle">
   <int>3</int>
  </edit>
 </match>
 <match target="font">
  <test compare="contains" name="family">
   <string>JetBrainsMono Nerd Font</string>
  </test>
  <edit mode="assign" name="fontfeatures">
   <string>calt off</string>
   <string>cv18 on</string>
   <string>cv19 on</string>
   <string>cv14 on</string>
  </edit>
 </match>
 <dir>~/.fonts</dir>
 <dir>~/.local/share/fonts</dir>
</fontconfig>
